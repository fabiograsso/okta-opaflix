name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched [existing issues](https://github.com/fabiograsso/okta-opaflix/issues) and this bug has not been reported
          required: true
        - label: I have read the [documentation](https://github.com/fabiograsso/okta-opaflix/blob/main/README.md)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Mode
      description: How is Opaflix deployed?
      options:
        - Single-tenant (environment variables)
        - Multi-tenant (database)
        - Docker
        - Vercel
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: session-type
    attributes:
      label: Affected Session Type
      description: Which session type is affected?
      options:
        - SSH sessions
        - RDP sessions
        - Both
        - Not applicable

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (specify in additional context)

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v24.0.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Add relevant logs or screenshots (drag and drop images here)
      placeholder: Paste logs or drag images here...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: OS version, network setup, workarounds tried...
