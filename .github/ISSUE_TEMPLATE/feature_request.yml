name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the form below.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched [existing issues](https://github.com/fabiograsso/okta-opaflix/issues) and this feature has not been requested
          required: true
        - label: I have read the [documentation](https://github.com/fabiograsso/okta-opaflix/blob/main/README.md) and this feature doesn't already exist
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Session playback (SSH/RDP)
        - Search and filtering
        - User interface
        - Authentication / Security
        - AWS / S3 integration
        - OPA API integration
        - Configuration / Settings
        - Deployment / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is this related to a problem? Describe the frustration or limitation.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered
      placeholder: Other approaches you've thought about...

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - "Yes, I can submit a PR"
        - "Yes, I can help with testing"
        - "No, but I can provide more details if needed"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any mockups, screenshots, or additional context
      placeholder: Drag images here or add links...
