services:
  # Production service (default)
  opaflix:
    build:
      context: .
      target: production
    profiles:
      - prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  # Development service
  opaflix-dev:
    build:
      context: .
      target: development
    profiles:
      - dev
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for live reload
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      # Mount package files (for dependency changes)
      - ./package.json:/app/package.json:ro
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PGUSER:-opaflix}
      POSTGRES_PASSWORD: ${PGPASSWORD:-opaflix}
      POSTGRES_DB: ${PGDATABASE:-opaflix}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - dev
    env_file:
      - .env.development

volumes:
  opaflix-cache:
  postgres-data:
